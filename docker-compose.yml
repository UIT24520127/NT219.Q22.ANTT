version: '3.8'

services:

  # 1. MariaDB
  db:
    image: mariadb:10.11
    container_name: drm_mariadb
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: drm_system
    volumes:
      - ./data/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - drm-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # 2. OpenBao KMS
  openbao:
    image: quay.io/openbao/openbao:2.0
    container_name: drm_kms
    environment:
      BAO_DEV_ROOT_TOKEN_ID: "root-token"
      VAULT_DEV_ROOT_TOKEN_ID: "root-token"
      BAO_ADDR: "http://0.0.0.0:8200"
    volumes:
      - ./security/config:/vault/config
      - ./data/kms-store:/vault/file
      - ./security/certificates/certs:/vault/config/certs:ro
    command: server -config=/vault/config/bao-config.hcl
    networks:
      - drm-network
    # healthcheck:
      # OpenBao image không có wget — dùng curl
      # /v1/sys/health trả về các HTTP code khác nhau tùy trạng thái:
      #   200 = initialized+unsealed, 429 = standby, 472 = recovery,
      #   501 = not initialized (file storage, chưa init), 503 = sealed
      # Tất cả đều có nghĩa "server đang sống" — chỉ lỗi kết nối mới là fail
      # test: ["CMD-SHELL", "curl -sf -o /dev/null -w '%{http_code}' http://localhost:8200/v1/sys/health | grep -qE '(200|429|472|473|501|503)'"]
      # interval: 10s
      # timeout: 5s
      # retries: 10
      # start_period: 20s

  # 3. Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: drm_auth
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: keycloak
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8080:8080"
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm.json:ro
    command: start-dev --import-realm
    networks:
      - drm-network
    # healthcheck:
    #   # Keycloak có curl sẵn, dùng endpoint /health/ready (Keycloak 23+)
    #   # start_period dài vì Keycloak mất 30-90s để boot + import realm
    #   test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
    #   interval: 15s
    #   timeout: 10s
    #   retries: 10
    #   start_period: 90s

  # 4. OPA
  opa:
    image: openpolicyagent/opa:latest
    container_name: drm_opa
    ports:
      - "8181:8181"
    volumes:
      - ./policies:/policies:ro
    command: "run --server /policies"
    networks:
      - private-subnet

  # 5. Next.js App
  app:
    build:
      context: ./app-core
    container_name: drm_app
    env_file:
      - .env
    command: npm run dev
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root_password
      DB_NAME: drm_system
      DATABASE_URL: "mysql://root:root_password@db:3306/drm_system"

      BAO_ADDR: "http://openbao:8200"
      BAO_DEV_ROOT_TOKEN_ID: "s.A6DrWqVqAXR0gKhpE2raGAMF"
      KMS_TRANSIT_KEY_NAME: "music-app-key"

      KEYCLOAK_ISSUER: "http://keycloak:8080/realms/drm-realm"
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_SECRET: ${KEYCLOAK_SECRET}
      KEYCLOAK_FRONTEND_CLIENT_ID: "frontend-client"
      KEYCLOAK_FRONTEND_SECRET: ""

      KEYCLOAK_DPOP_PRIVATE_JWK: ${KEYCLOAK_DPOP_PRIVATE_JWK}
      DPOP_MAX_AGE: ${DPOP_MAX_AGE:-120}

      APP_URL: "http://localhost:3000"

      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_REGION: auto
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_ENDPOINT: "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

      MTLS_CERT_DIR: /app/certs
      NODE_ENV: development

    volumes:
      - ./app-core:/app
      - /app/node_modules
      - /app/.next
      - ./security/certificates/certs:/app/certs:ro
      - ./app-core/public/audio:/app/public/audio

    depends_on:
      db:
        condition: service_healthy
      # openbao:
      #   condition: service_healthy
      # keycloak:
      #   condition: service_healthy

    networks:
      - drm-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 6. Nginx
  nginx:
    image: nginx:latest
    container_name: drm_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./security/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./security/nginx/certs:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - public-subnet
      - private-subnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 7. Prometheus - Metrics collection and monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: drm_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - app
    networks:
      - private-subnet
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 8. Grafana - Visualization dashboard (Optional, for better metrics viewing)
  grafana:
    image: grafana/grafana:latest
    container_name: drm_grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - private-subnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  drm-network:
    driver: bridge
