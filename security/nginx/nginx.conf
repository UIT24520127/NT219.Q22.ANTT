# ============================================================================
# NGINX CONFIGURATION FOR SECURE MEDIA DELIVERY WITH SIGNED URLS
# ============================================================================
# This configuration:
# 1. Blocks direct R2 access from frontend
# 2. Routes all media requests through backend Signed URL validation
# 3. Proxies to Cloudflare R2 with signed temporary URLs
# 4. Implements rate limiting and security headers
# ============================================================================

# Rate limiting: max 100 requests per minute per IP
limit_req_zone $binary_remote_addr zone=media_limit:10m rate=100r/m;

# Cache zone for signed URLs (small cache, only for redirect)
proxy_cache_path /var/cache/nginx/media levels=1:2 keys_zone=media_cache:10m 
                 max_size=100m inactive=5m use_temp_path=off;

upstream backend {
    # Next.js application server (use Docker network name)
    server app:3000;
    keepalive 32;
}

# ============================================================================
# HTTP REDIRECT TO HTTPS (Production recommended)
# ============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name _;
    
    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================================
# MAIN HTTPS SERVER CONFIGURATION
# ============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # ========================================================================
    # SSL CERTIFICATES (REPLACE WITH YOUR ACTUAL PATHS)
    # ========================================================================
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Strong SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Body size limit for uploads
    client_max_body_size 500M;

    # ========================================================================
    # SECURITY HEADERS
    # ========================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'; media-src 'self'; script-src 'self' 'unsafe-inline'" always;

    # ========================================================================
    # SIGNED URL ENDPOINT (Backend)
    # Route: GET /api/media/signed-url?key=audio/track-123/segment.mp4
    # ========================================================================
    location /api/media/signed-url {
        # Apply rate limiting
        limit_req zone=media_limit burst=10 nodelay;

        # Proxy to Next.js backend
        proxy_pass http://backend;
        proxy_http_version 1.1;
        
        # Preserve headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ========================================================================
    # BATCH SIGNED URLS ENDPOINT (Backend)
    # Route: POST /api/media/signed-urls
    # ========================================================================
    location /api/media/signed-urls {
        # Only allow POST requests
        if ($request_method != POST) {
            return 405 "Method Not Allowed";
        }

        # Apply rate limiting
        limit_req zone=media_limit burst=5 nodelay;

        # Proxy to Next.js backend
        proxy_pass http://backend;
        proxy_http_version 1.1;
        
        # Preserve headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ========================================================================
    # BLOCK DIRECT R2 ACCESS
    # Users must request via /api/media/signed-url endpoint
    # ========================================================================
    location ~ ^/(audio|encrypted-audio|protected) {
        # 403 Forbidden - Direct access not allowed
        return 403 "Direct access to protected media is forbidden. Use /api/media/signed-url endpoint.";
    }

    # ========================================================================
    # BACKEND PROXY (All other API routes)
    # ========================================================================
    location /api/ {
        # Apply rate limiting
        limit_req zone=media_limit burst=20 nodelay;

        # Proxy to Next.js backend
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ========================================================================
    # FRONTEND (Next.js pages and static assets)
    # ========================================================================
    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_cache media_cache;
            proxy_cache_valid 200 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ========================================================================
    # HEALTH CHECK ENDPOINT
    # ========================================================================
    location /health {
        access_log off;
        proxy_pass http://backend;
        proxy_http_version 1.1;
    }

    # ========================================================================
    # DENY ACCESS TO SENSITIVE FILES
    # ========================================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ============================================================================
# DOCKER COMPOSE USAGE:
# ============================================================================
# 1. Mount this file in docker-compose.yml:
#    volumes:
#      - ./nginx.conf:/etc/nginx/nginx.conf:ro
#
# 2. Update YOUR_R2_ACCOUNT_ID with actual Cloudflare R2 account ID
#
# 3. Mount SSL certificates:
#    volumes:
#      - ./security/nginx/cert.pem:/etc/nginx/ssl/cert.pem:ro
#      - ./security/nginx/key.pem:/etc/nginx/ssl/key.pem:ro
#
# 4. Test configuration:
#    docker exec drm_nginx nginx -t
#
# 5. Reload after changes:
#    docker exec drm_nginx nginx -s reload
# ============================================================================
